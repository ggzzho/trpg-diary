<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#c8a96e" />
    <meta name="description" content="나만의 TRPG 다이어리 - 일정, 기록, 룰북, 시나리오를 한곳에서 관리하세요" />
    <title>TRPG Diary ✦</title>
    <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Google Material Symbols Rounded -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <!-- 브라우저 자동완성 전역 차단 -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        function disableAutofill(root) {
          root.querySelectorAll('input:not([type="submit"]):not([type="button"]):not([type="checkbox"]):not([type="radio"]):not([type="date"]):not([type="time"]):not([type="color"]):not([type="range"]), textarea').forEach(function(el) {
            if (!el.getAttribute('autocomplete') || el.getAttribute('autocomplete') === 'on') {
              el.setAttribute('autocomplete', 'off');
            }
          });
        }
        disableAutofill(document);
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(m) {
            m.addedNodes.forEach(function(node) {
              if (node.nodeType === 1) disableAutofill(node);
            });
          });
        });
        observer.observe(document.body, { childList: true, subtree: true });
      });
    </script>
  </head>
  <body>
    <noscript>이 앱을 사용하려면 JavaScript를 활성화해주세요.</noscript>
    <div style="display:none" aria-hidden="true">
      <input type="text" name="prevent_autofill" tabindex="-1" />
      <input type="password" name="prevent_autofill_pw" tabindex="-1" />
    </div>
    <div id="root"></div>
  </body>
</html>
